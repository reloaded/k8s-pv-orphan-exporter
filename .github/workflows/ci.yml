# PR / main-branch CI.
#
# This workflow runs on every pull request and on every push to main.
# It is the gate the project intends to make required via branch
# protection (the rule itself lives in repo settings, not in this file).
#
# Jobs run in parallel; each is intentionally narrow so a failure in
# one (e.g. lint) doesn't mask a failure in another (e.g. tests).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: v2.11.4

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go test -race
        run: go test -race -coverprofile=coverage.out ./...
      - name: upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go build ./...

  docker:
    # Verify the Dockerfile actually builds on every PR so a broken
    # image surfaces here rather than at release time. Native arch
    # only — the multi-arch build runs in release.yml.
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: k8s-pv-orphan-exporter:ci
          build-args: |
            VERSION=ci-${{ github.sha }}
            REVISION=${{ github.sha }}
            BRANCH=${{ github.head_ref || github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
