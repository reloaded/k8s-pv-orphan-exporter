# Release: build and publish a multi-arch container image to GHCR
# whenever a `v*` tag is pushed.
#
# Tag scheme matches docs/design.md §"Project metadata":
#   - vX.Y.Z       — the literal git tag
#   - latest       — always points at the most recent release
#   - sha-<short>  — the commit SHA the release was cut from
#
# Per-main-branch publishing is intentionally not done here; releases
# are gated on tags so :latest is always something the maintainer
# explicitly cut.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/k8s-pv-orphan-exporter

jobs:
  release:
    name: build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            BRANCH=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
