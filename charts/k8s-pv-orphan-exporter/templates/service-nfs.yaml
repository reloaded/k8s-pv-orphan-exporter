{{- if .Values.nfs.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kpoe.fullname" . }}-nfs
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kpoe.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-scanner
spec:
  type: {{ .Values.nfs.service.type }}
  selector:
    {{- include "kpoe.selectorLabels" (dict "ctx" . "component" "nfs-scanner") | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.listenPort }}
      targetPort: metrics
      protocol: TCP
{{- end }}
