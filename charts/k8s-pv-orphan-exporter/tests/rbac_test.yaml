suite: ServiceAccount + RBAC
templates:
  - serviceaccount.yaml
  - rbac.yaml
release:
  name: smoke
  namespace: monitoring
tests:
  - it: ServiceAccount renders by default with release-derived name in release namespace
    template: serviceaccount.yaml
    asserts:
      - hasDocuments: { count: 1 }
      - isKind: { of: ServiceAccount }
      - equal:
          path: metadata.name
          value: smoke-k8s-pv-orphan-exporter
      - equal:
          path: metadata.namespace
          value: monitoring

  - it: rbac.yaml renders both ClusterRole and ClusterRoleBinding by default
    template: rbac.yaml
    asserts:
      - hasDocuments: { count: 2 }

  - it: ClusterRole grants PV-only read access (never write)
    template: rbac.yaml
    documentIndex: 0
    asserts:
      - isKind: { of: ClusterRole }
      - equal:
          path: metadata.name
          value: smoke-k8s-pv-orphan-exporter
      - equal:
          path: rules[0].apiGroups[0]
          value: ""
      - equal:
          path: rules[0].resources
          value: [persistentvolumes]
      - equal:
          path: rules[0].verbs
          value: [get, list, watch]
      # Hard invariant: the exporter is strictly read-only.
      - notContains:
          path: rules[0].verbs
          content: create
      - notContains:
          path: rules[0].verbs
          content: delete
      - notContains:
          path: rules[0].verbs
          content: update
      - notContains:
          path: rules[0].verbs
          content: patch

  - it: ClusterRoleBinding subject points at the chart's ServiceAccount in the release namespace
    template: rbac.yaml
    documentIndex: 1
    asserts:
      - isKind: { of: ClusterRoleBinding }
      - equal:
          path: metadata.name
          value: smoke-k8s-pv-orphan-exporter
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: smoke-k8s-pv-orphan-exporter
      - equal:
          path: subjects[0].namespace
          value: monitoring

  - it: cluster-scoped objects honour fullnameOverride so parallel installs don't collide
    template: rbac.yaml
    set:
      fullnameOverride: my-custom-name
    asserts:
      - hasDocuments: { count: 2 }
      - equal:
          path: metadata.name
          value: my-custom-name
        documentIndex: 0
      - equal:
          path: metadata.name
          value: my-custom-name
        documentIndex: 1

  - it: SA omitted when serviceAccount.create=false
    template: serviceaccount.yaml
    set:
      serviceAccount.create: false
      serviceAccount.name: my-external-sa
    asserts:
      - hasDocuments: { count: 0 }

  - it: RBAC still binds the provided SA name when serviceAccount.create=false
    template: rbac.yaml
    set:
      serviceAccount.create: false
      serviceAccount.name: my-external-sa
    asserts:
      - equal:
          path: subjects[0].name
          value: my-external-sa
        documentIndex: 1

  - it: RBAC omitted when rbac.create=false
    template: rbac.yaml
    set:
      rbac.create: false
    asserts:
      - hasDocuments: { count: 0 }
