suite: local-path DaemonSet
templates:
  - daemonset-localpath.yaml
release:
  name: smoke
  namespace: monitoring
tests:
  - it: renders by default
    asserts:
      - hasDocuments: { count: 1 }
      - isKind: { of: DaemonSet }
      - equal:
          path: metadata.name
          value: smoke-k8s-pv-orphan-exporter-local-path
      - equal:
          path: metadata.namespace
          value: monitoring
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: local-path-scanner

  - it: selector labels are the immutable triple (name+instance+component)
    asserts:
      # If chart/version ever leaks in here, in-place upgrades break.
      - isSubset:
          path: spec.selector.matchLabels
          content:
            app.kubernetes.io/name: k8s-pv-orphan-exporter
            app.kubernetes.io/instance: smoke
            app.kubernetes.io/component: local-path-scanner
      - notExists:
          path: spec.selector.matchLabels["helm.sh/chart"]
      - notExists:
          path: spec.selector.matchLabels["app.kubernetes.io/version"]
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: local-path-scanner

  - it: composes args from scan/log/scanner values
    set:
      scan.interval: 10m
      scan.maxDepth: 4
      log.level: debug
      localPath.storageRoots: ["/host/a", "/host/b"]
      localPath.excludes: "lost+found,.zfs"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --scan.interval=10m
      - contains:
          path: spec.template.spec.containers[0].args
          content: --scan.max-depth=4
      - contains:
          path: spec.template.spec.containers[0].args
          content: --log.level=debug
      - contains:
          path: spec.template.spec.containers[0].args
          content: --scanner.local-path.storage-roots=/host/a,/host/b
      - contains:
          path: spec.template.spec.containers[0].args
          content: --scanner.local-path.exclude=lost+found,.zfs

  - it: omits --scanner.local-path.cross-fs unless explicitly enabled
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --scanner.local-path.cross-fs

  - it: appends --scanner.local-path.cross-fs when set
    set:
      localPath.crossFs: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --scanner.local-path.cross-fs

  - it: mounts the host storage root read-only via hostPath
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].hostPath.path
          value: /opt/local-path-provisioner
      - equal:
          path: spec.template.spec.volumes[0].hostPath.type
          value: DirectoryOrCreate
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].readOnly
          value: true
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /host/local-path

  - it: exposes NODE_NAME via downward API
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: NODE_NAME
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.fieldRef.fieldPath
          value: spec.nodeName

  - it: tolerates all taints by default
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].operator
          value: Exists

  - it: is omitted when localPath.enabled=false
    set:
      localPath.enabled: false
    asserts:
      - hasDocuments: { count: 0 }
